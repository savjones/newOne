# Pairs Trading Strategy Configuration
# This strategy identifies cointegrated pairs and trades the spread

strategy:
  # Cointegration Parameters
  cointegration_lookback: 252  # Days to test cointegration
  cointegration_pvalue: 0.05  # Maximum p-value for cointegration
  cointegration_retest_frequency: 21  # Retest every 21 days
  
  # Spread Analysis
  spread_lookback: 60  # Days to calculate spread statistics
  z_score_entry: 2.0  # Z-score threshold for entry
  z_score_exit: 0.5   # Z-score threshold for exit
  z_score_stop: 4.0   # Z-score threshold for stop loss
  
  # Position Sizing
  base_position_size: 0.1
  volatility_scaling: true
  max_position_size: 0.3
  correlation_scaling: true
  
  # Risk Management
  stop_loss_atr_multiplier: 2.0
  take_profit_ratio: 2.0
  max_hold_period: 120  # Maximum days to hold position
  correlation_threshold: 0.7
  
  # Performance Filters
  min_correlation: 0.6
  max_spread_volatility: 0.1
  min_spread_mean_reversion: 0.3
  
  # Pairs Selection
  min_pairs: 3
  max_pairs: 10
  pairs_update_frequency: 7  # Update pairs every 7 days
  
  # Spread Calculation
  spread_method: "linear"  # linear, log, ratio
  hedge_ratio_method: "ols"  # ols, kalman, rolling
  
  # Machine Learning Integration
  ml_enabled: true
  feature_engineering: true

# Strategy-specific risk parameters
risk:
  max_drawdown: 0.12
  max_position_risk: 0.015
  correlation_threshold: 0.7
  max_correlation_exposure: 0.4

# Performance targets
performance:
  min_sharpe: 1.3
  max_drawdown: 0.15
  min_hit_rate: 0.55
  max_turnover: 0.40

# Market regime filters
filters:
  volatility_regime: "medium"  # low, medium, high
  trend_regime: "sideways"     # trending, sideways, choppy
  volume_regime: "normal"      # low, normal, high
  
# Optimization parameters
optimization:
  enabled: true
  method: "genetic"  # grid_search, genetic, bayesian
  parameters:
    z_score_entry: [1.5, 2.0, 2.5, 3.0]
    z_score_exit: [0.3, 0.5, 0.7, 1.0]
    z_score_stop: [3.0, 4.0, 5.0, 6.0]
    spread_lookback: [30, 60, 90, 120]
    cointegration_lookback: [126, 252, 504]
  
# Backtesting parameters
backtesting:
  lookback_period: 504  # Trading days (longer for pairs)
  warmup_period: 100
  rebalance_frequency: "daily"
  transaction_costs:
    commission: 0.001
    slippage: 0.0005
  
# Machine Learning integration
ml_integration:
  enabled: true
  features:
    - zscore
    - spread_volatility
    - mean_reversion_strength
    - correlation
    - hedge_ratio_stability
    - spread_momentum
    - volume_imbalance
    - market_regime
  
  models:
    - name: "pair_selector"
      type: "random_forest"
      purpose: "select_best_trading_pairs"
    
    - name: "entry_timing"
      type: "xgboost"
      purpose: "optimize_entry_timing"
    
    - name: "exit_timing"
      type: "ensemble"
      purpose: "optimize_exit_timing"
    
    - name: "hedge_ratio_predictor"
      type: "lstm"
      purpose: "predict_hedge_ratio_changes"
  
  training:
    retrain_frequency: "weekly"
    min_training_samples: 2000
    validation_split: 0.2
    cross_validation_folds: 5

# Pairs selection criteria
pairs_selection:
  min_data_length: 252  # Minimum days of data
  min_volume: 1000000   # Minimum daily volume
  min_market_cap: 100000000  # Minimum market cap
  max_spread_costs: 0.002   # Maximum spread costs
  
  # Sector/asset class filters
  allowed_sectors:
    - "cryptocurrency"
    - "defi"
    - "layer1"
    - "layer2"
  
  # Correlation filters
  max_intra_sector_correlation: 0.8
  min_cross_sector_correlation: 0.3

# Monitoring and alerts
monitoring:
  performance_check_frequency: "daily"
  risk_check_frequency: "hourly"
  pairs_update_frequency: "weekly"
  
  alerts:
    - type: "drawdown"
      threshold: 0.10
      action: "reduce_position_sizes"
    
    - type: "correlation_increase"
      threshold: 0.8
      action: "reduce_correlated_positions"
    
    - type: "cointegration_breakdown"
      threshold: 0.1
      action: "close_affected_positions"
    
    - type: "spread_volatility_spike"
      threshold: 0.15
      action: "reduce_position_sizes"
