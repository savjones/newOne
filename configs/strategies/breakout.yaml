# Breakout Strategy Configuration
# This strategy identifies breakouts from established ranges using Donchian and Keltner Channels

strategy:
  # Channel Parameters
  donchian_period: 20
  keltner_period: 20
  keltner_multiplier: 2.0
  
  # Volume Confirmation
  volume_ma_period: 20
  volume_threshold: 1.5
  volume_surge_threshold: 2.0
  
  # Volatility Confirmation
  atr_period: 14
  volatility_threshold: 1.2
  volatility_expansion_threshold: 1.5
  
  # Breakout Parameters
  breakout_confirmation_bars: 2
  false_breakout_filter: true
  consolidation_threshold: 0.02
  
  # Entry/Exit Rules
  entry_delay: 1  # Bars to wait after breakout
  stop_loss_atr_multiplier: 2.0
  take_profit_ratio: 3.0
  trailing_stop: true
  trailing_stop_atr_multiplier: 1.5
  
  # Position Sizing
  base_position_size: 0.1
  volatility_scaling: true
  max_position_size: 0.3
  breakout_strength_scaling: true
  
  # Performance Filters
  min_range_size: 0.05  # Minimum range as % of price
  max_range_size: 0.30  # Maximum range as % of price
  trend_filter: true
  trend_ma_period: 50
  
  # Risk Management
  max_hold_period: 72  # Maximum bars to hold position
  correlation_threshold: 0.7

# Strategy-specific risk parameters
risk:
  max_drawdown: 0.15
  max_position_risk: 0.02
  correlation_threshold: 0.7

# Performance targets
performance:
  min_sharpe: 1.2
  max_drawdown: 0.18
  min_hit_rate: 0.50
  max_turnover: 0.60

# Market regime filters
filters:
  volatility_regime: "medium"  # low, medium, high
  trend_regime: "sideways"     # trending, sideways, choppy
  volume_regime: "normal"      # low, normal, high
  
# Optimization parameters
optimization:
  enabled: true
  method: "genetic"  # grid_search, genetic, bayesian
  parameters:
    donchian_period: [15, 20, 25, 30]
    keltner_period: [15, 20, 25, 30]
    keltner_multiplier: [1.5, 2.0, 2.5, 3.0]
    volume_threshold: [1.2, 1.5, 1.8, 2.0]
    volatility_threshold: [1.0, 1.2, 1.5, 1.8]
    breakout_confirmation_bars: [1, 2, 3]
  
# Backtesting parameters
backtesting:
  lookback_period: 252  # Trading days
  warmup_period: 50
  rebalance_frequency: "daily"
  transaction_costs:
    commission: 0.001
    slippage: 0.0005
  
# Machine Learning integration
ml_integration:
  enabled: true
  features:
    - breakout_strength
    - volume_ratio
    - volatility_ratio
    - range_size
    - trend_direction
    - consolidation
    - above_donchian
    - above_keltner
  
  models:
    - name: "breakout_validator"
      type: "random_forest"
      purpose: "validate_breakout_signals"
    
    - name: "position_sizer"
      type: "xgboost"
      purpose: "dynamic_position_sizing"
    
    - name: "false_breakout_detector"
      type: "ensemble"
      purpose: "detect_false_breakouts"
  
  training:
    retrain_frequency: "weekly"
    min_training_samples: 1000
    validation_split: 0.2
    cross_validation_folds: 5

# Monitoring and alerts
monitoring:
  performance_check_frequency: "daily"
  risk_check_frequency: "hourly"
  alerts:
    - type: "drawdown"
      threshold: 0.10
      action: "reduce_position_sizes"
    
    - type: "volatility_spike"
      threshold: 0.15
      action: "pause_trading"
    
    - type: "false_breakout_increase"
      threshold: 0.3
      action: "tighten_confirmation_rules"
