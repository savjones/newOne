# Microstructure Strategy Configuration
# This strategy analyzes order flow imbalances, book imbalance, and VWAP drift

strategy:
  # Order Flow Parameters
  order_flow_window: 10
  imbalance_threshold: 0.6
  flow_strength_threshold: 0.7
  
  # Book Imbalance Parameters
  book_levels: 5
  book_imbalance_threshold: 0.3
  book_depth_threshold: 1000000  # Minimum depth in base currency
  
  # VWAP Drift Parameters
  vwap_period: 20
  vwap_drift_threshold: 0.001
  drift_confirmation_bars: 3
  
  # Volume Analysis
  volume_profile_period: 20
  volume_imbalance_threshold: 0.4
  large_trade_threshold: 0.1  # % of average volume
  
  # Market Impact
  impact_threshold: 0.0005
  impact_decay_period: 5
  
  # Entry/Exit Rules
  entry_delay: 0  # Immediate entry
  stop_loss_atr_multiplier: 1.5
  take_profit_ratio: 2.0
  max_hold_period: 24  # Short-term positions
  
  # Position Sizing
  base_position_size: 0.05  # Smaller positions for microstructure
  volatility_scaling: true
  max_position_size: 0.15
  imbalance_scaling: true
  
  # Performance Filters
  min_volatility: 0.005
  max_volatility: 0.05
  spread_threshold: 0.0002  # Maximum bid-ask spread
  
  # Risk Management
  correlation_threshold: 0.8
  max_correlation_exposure: 0.3

# Strategy-specific risk parameters
risk:
  max_drawdown: 0.10
  max_position_risk: 0.01
  correlation_threshold: 0.8

# Performance targets
performance:
  min_sharpe: 1.5
  max_drawdown: 0.12
  min_hit_rate: 0.60
  max_turnover: 0.80

# Market regime filters
filters:
  volatility_regime: "medium"  # low, medium, high
  trend_regime: "sideways"     # trending, sideways, choppy
  volume_regime: "normal"      # low, normal, high
  
# Optimization parameters
optimization:
  enabled: true
  method: "bayesian"  # grid_search, genetic, bayesian
  parameters:
    order_flow_window: [5, 10, 15, 20]
    imbalance_threshold: [0.4, 0.6, 0.8, 1.0]
    flow_strength_threshold: [0.5, 0.7, 0.9]
    vwap_drift_threshold: [0.0005, 0.001, 0.0015, 0.002]
    drift_confirmation_bars: [2, 3, 4, 5]
  
# Backtesting parameters
backtesting:
  lookback_period: 126  # Trading days (shorter for microstructure)
  warmup_period: 30
  rebalance_frequency: "hourly"
  transaction_costs:
    commission: 0.001
    slippage: 0.0003  # Lower slippage for microstructure
  
# Machine Learning integration
ml_integration:
  enabled: true
  features:
    - order_flow_imbalance
    - flow_strength
    - book_imbalance
    - vwap_drift
    - volume_profile
    - volume_imbalance
    - market_impact
    - impact_decay
    - large_trades
  
  models:
    - name: "signal_validator"
      type: "random_forest"
      purpose: "validate_microstructure_signals"
    
    - name: "position_sizer"
      type: "xgboost"
      purpose: "dynamic_position_sizing"
    
    - name: "impact_predictor"
      type: "lstm"
      purpose: "predict_market_impact"
  
  training:
    retrain_frequency: "daily"
    min_training_samples: 500
    validation_split: 0.2
    cross_validation_folds: 5

# Monitoring and alerts
monitoring:
  performance_check_frequency: "hourly"
  risk_check_frequency: "15min"
  alerts:
    - type: "drawdown"
      threshold: 0.08
      action: "reduce_position_sizes"
    
    - type: "volatility_spike"
      threshold: 0.08
      action: "pause_trading"
    
    - type: "book_depth_decrease"
      threshold: 0.5
      action: "reduce_position_sizes"
    
    - type: "spread_widening"
      threshold: 0.0003
      action: "pause_trading"
